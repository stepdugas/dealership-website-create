<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <!-- SEO & Open Graph — overridden per-page by usePageMeta composable -->
    <meta name="description" content="Free VIN decoder for car dealers — plus professional dealership websites built in 2 weeks from $1,000. Inventory management, lead capture, and local SEO included." />
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Custom Dealership Websites" />
    <meta property="og:title"       content="Free VIN Decoder & Custom Dealership Websites" />
    <meta property="og:description" content="Decode any VIN free — no sign-up required. Independent car dealers: get a professional website built in 2 weeks from $1,000." />
    <meta property="og:url"         content="https://cardealershipswebsitebuilder.com/" />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=1200&q=80" />
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Free VIN Decoder & Custom Dealership Websites" />
    <meta name="twitter:description" content="Decode any VIN free — no sign-up required. Independent car dealers: get a professional website built in 2 weeks from $1,000." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&w=1200&q=80" />
    <link rel="canonical" href="https://cardealershipswebsitebuilder.com/" />
    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Free VIN Decoder & Custom Dealership Websites</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- Netlify form detection: dealer inquiry (landing page + city pages) -->
    <form name="dealer-inquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"  name="name" />
      <input type="email" name="email" />
      <input type="text"  name="dealership" />
      <input type="tel"   name="phone" />
      <input type="text"  name="planPreference" />
      <input type="text"  name="contactPreference" />
      <textarea           name="message"></textarea>
      <input type="text"  name="city" />
    </form>

    <!-- Netlify form detection: quick question chat widget -->
    <form name="quick-question" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"  name="name" />
      <input type="email" name="email" />
      <textarea           name="question"></textarea>
    </form>

    <!-- Hidden form so Netlify detects it at build time -->
    <form name="client-intake" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="businessName" />
      <input type="text" name="tagline" />
      <input type="text" name="phone" />
      <input type="text" name="email" />
      <input type="text" name="address" />
      <input type="text" name="city" />
      <input type="text" name="state" />
      <input type="text" name="zip" />
      <input type="text" name="hours" />
      <input type="text" name="primaryColor" />
      <input type="text" name="facebook" />
      <input type="text" name="instagram" />
      <input type="text" name="aboutBlurb" />
      <input type="text" name="aboutMission" />
      <input type="text" name="aboutYearFounded" />
      <input type="text" name="aboutStatYears" />
      <input type="text" name="aboutStatVehicles" />
      <input type="text" name="aboutStatReviews" />
      <input type="text" name="aboutStatTeam" />
      <input type="text" name="domain" />
      <input type="text" name="pages" />
      <input type="text" name="notes" />
    </form>
  </body>
</html>
